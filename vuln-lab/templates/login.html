{% extends 'base.html' %}
{% block title %}— Login{% endblock %}
{% block content %}
<div class="card" style="width:420px; padding:2rem;">
  <div class="text-center mb-4">
    <h2 style="color:#1a2342; font-weight:700;">Nex<span style="color:#4da6ff">Bank</span></h2>
    <p class="text-muted small">Acesse sua conta com segurança</p>
  </div>
  {% if error %}
  <div class="alert alert-danger py-2">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Usuário</label>
      <input name="username" class="form-control" placeholder="seu usuário" autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input name="password" type="password" class="form-control" placeholder="••••••••">
    </div>
    <button class="btn btn-primary w-100 py-2">Entrar</button>
  </form>
  <hr class="my-3">
  <p class="text-center small text-muted mb-0">Não tem conta? <a href="/register">Cadastre-se</a></p>
</div>
{% endblock %}
