{% extends 'base.html' %}
{% block title %}— Transferir{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="mb-1">Nova transferência</h5>
      <p class="text-muted small mb-4">Saldo atual: <strong class="text-success">R$ {{ "%.2f"|format(user['balance']) }}</strong></p>

      {% if msg %}
      <div class="alert alert-{{ 'success' if msg[0]=='success' else 'danger' }} py-2">{{ msg[1] }}</div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Destinatário (usuário)</label>
          <input name="recipient" class="form-control" placeholder="nome do usuário">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Valor (R$)</label>
          <input name="amount" type="number" step="0.01" min="0.01" class="form-control" placeholder="0,00">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Descrição</label>
          <input name="description" class="form-control" placeholder="Motivo da transferência">
        </div>
        <button class="btn btn-primary w-100 py-2">Transferir</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
