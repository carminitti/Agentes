{% extends 'base.html' %}
{% block title %}— Editar Perfil{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="mb-4">Editar Perfil</h5>
      <form method="POST">
        <div class="mb-4">
          <label class="form-label fw-semibold">Bio <span class="text-muted fw-normal small">(suporta HTML)</span></label>
          <textarea name="bio" class="form-control" rows="5" placeholder="Conte algo sobre você...">{{ user['bio'] or '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary">Salvar</button>
          <a href="/profile/{{ user['id'] }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
